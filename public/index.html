<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Chat - Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="landing-container">
    <div class="landing-card">
      <h1>👨‍👩‍👧‍👦 Family Chat</h1>
      <p>Welcome to our family chat room! Share moments and memories with your loved ones.</p>
      
      <form id="nameForm">
        <input 
          type="text" 
          id="nameInput" 
          placeholder="Enter your name" 
          required
          maxlength="20"
        >
        <button type="submit" class="btn-join">Join Chat →</button>
      </form>

      <div class="family-photos">
        <h3>Our Family Moments</h3>
        <div class="photo-preview">
          <img src="https://via.placeholder.com/150?text=Family" alt="Family photo 1">
          <img src="https://via.placeholder.com/150?text=Memories" alt="Family photo 2">
          <img src="https://via.placeholder.com/150?text=Together" alt="Family photo 3">
          <img src="https://via.placeholder.com/150?text=Love" alt="Family photo 4">
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('nameForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('nameInput').value.trim();
      
      if (name) {
        sessionStorage.setItem('userName', name);
        window.location.href = '/chat';
      }
    });
  </script>
</body>
</html>
